<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>系统设置 - rust-ime</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="/static/index.html" class="back-link">← 返回主页</a>
            <h1>系统设置</h1>
        </header>

        <div class="card">
            <h2>输入方案</h2>
            <div class="setting-item" style="display: block;">
                <div class="info">
                    <div class="title">活跃输入方案 (多选混输)</div>
                    <div class="desc">勾选您想要启用的输入方案，它们将同时生效。</div>
                </div>
                <div id="active_profiles_container" class="profile-chip-group"></div>
            </div>
        </div>

        <h2>输入行为与转换</h2>
        <div class="card">
            <div class="setting-item">
                <div class="info">
                    <div class="title">繁体模式</div>
                    <div class="desc">开启后输出繁体中文</div>
                </div>
                <label class="switch"><input type="checkbox" id="enable_traditional"><span class="slider"></span></label>
            </div>
            <div class="setting-item">
                <div class="info">
                    <div class="title">首词固定</div>
                    <div class="desc">词库首位候选词位置固定，不参与自动调频。</div>
                </div>
                <label class="switch"><input type="checkbox" id="enable_fixed_first_candidate"><span class="slider"></span></label>
            </div>
            <div class="setting-item">
                <div class="info">
                    <div class="title">上屏模式</div>
                    <div class="desc">词模式：空格直接上屏；句模式：支持连续输入。</div>
                </div>
                <select id="commit_mode">
                    <option value="single">词模式 (单空格)</option>
                    <option value="double">句模式 (双空格)</option>
                </select>
            </div>
            <div class="setting-item">
                <div class="info"><div class="title">候选词数量</div><div class="desc">每页显示的候选词个数。</div></div>
                <input type="number" id="page_size">
            </div>
            <div class="setting-item">
                <div class="info">
                    <div class="title">开机自启</div>
                    <div class="desc">在系统启动时自动运行 rust-ime。</div>
                </div>
                <label class="switch"><input type="checkbox" id="autostart"><span class="slider"></span></label>
            </div>
        </div>

        <h2>模糊音设置</h2>
        <div class="card">
            <div class="setting-item">
                <div class="info"><div class="title">开启模糊音</div><div class="desc">容忍声母或韵母的模糊匹配</div></div>
                <label class="switch"><input type="checkbox" id="enable_fuzzy_pinyin"><span class="slider"></span></label>
            </div>
            
            <div id="fuzzy-options" style="display: none; padding-top: 10px; border-top: 1px solid #eee; margin-top: 10px;">
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                    <label class="checkbox-container">z ↔ zh <input type="checkbox" id="fuzzy_z_zh"><span class="checkmark"></span></label>
                    <label class="checkbox-container">c ↔ ch <input type="checkbox" id="fuzzy_c_ch"><span class="checkmark"></span></label>
                    <label class="checkbox-container">s ↔ sh <input type="checkbox" id="fuzzy_s_sh"><span class="checkmark"></span></label>
                    <label class="checkbox-container">n ↔ l <input type="checkbox" id="fuzzy_n_l"><span class="checkmark"></span></label>
                    <label class="checkbox-container">r ↔ l <input type="checkbox" id="fuzzy_r_l"><span class="checkmark"></span></label>
                    <label class="checkbox-container">f ↔ h <input type="checkbox" id="fuzzy_f_h"><span class="checkmark"></span></label>
                    <label class="checkbox-container">an ↔ ang <input type="checkbox" id="fuzzy_an_ang"><span class="checkmark"></span></label>
                    <label class="checkbox-container">en ↔ eng <input type="checkbox" id="fuzzy_en_eng"><span class="checkmark"></span></label>
                    <label class="checkbox-container">in ↔ ing <input type="checkbox" id="fuzzy_in_ing"><span class="checkmark"></span></label>
                    <label class="checkbox-container">ian ↔ iang <input type="checkbox" id="fuzzy_ian_iang"><span class="checkmark"></span></label>
                    <label class="checkbox-container">uan ↔ uang <input type="checkbox" id="fuzzy_uan_uang"><span class="checkmark"></span></label>
                    <label class="checkbox-container">u ↔ v <input type="checkbox" id="fuzzy_u_v"><span class="checkmark"></span></label>
                </div>
            </div>
        </div>
    </div>

    <div class="sticky-footer">
        <button class="btn" onclick="save()">保存更改</button>
        <button class="btn btn-danger" onclick="resetConfig()">重置默认</button>
    </div>

    <div id="toast" class="status-toast">已保存并应用</div>

    <script src="/static/js/settings.js"></script>
    <script>
        async function init() {
            await loadConfig();
            
            // 方案选择
            const pc = document.getElementById('active_profiles_container');
            pc.innerHTML = config.files.profiles.map(p => `
                <div class="profile-chip ${config.input.active_profiles.includes(p.name)?'active':''}" onclick="toggleProfile('${p.name}', this)">
                    <span>${p.name}</span>
                </div>
            `).join('');

            bindInput('enable_traditional', 'input');
            bindInput('enable_fixed_first_candidate', 'input');
            bindInput('commit_mode', 'input');
            bindInput('page_size', 'input');
            bindInput('autostart', 'input');

            // 模糊音绑定
            const fuzzySwitch = document.getElementById('enable_fuzzy_pinyin');
            const fuzzyOptions = document.getElementById('fuzzy-options');
            fuzzySwitch.checked = config.input.enable_fuzzy_pinyin;
            fuzzyOptions.style.display = fuzzySwitch.checked ? 'block' : 'none';
            fuzzySwitch.onchange = () => {
                config.input.enable_fuzzy_pinyin = fuzzySwitch.checked;
                fuzzyOptions.style.display = fuzzySwitch.checked ? 'block' : 'none';
            };

            const fuzzyKeys = ['z_zh', 'c_ch', 's_sh', 'n_l', 'r_l', 'f_h', 'an_ang', 'en_eng', 'in_ing', 'ian_iang', 'uan_uang', 'u_v'];
            fuzzyKeys.forEach(k => {
                const el = document.getElementById(`fuzzy_${k}`);
                el.checked = config.input.fuzzy_config[k];
                el.onchange = () => { config.input.fuzzy_config[k] = el.checked; };
            });
        }

        function toggleProfile(name, el) {
            const idx = config.input.active_profiles.indexOf(name);
            if (idx === -1) {
                config.input.active_profiles.push(name);
                el.classList.add('active');
            } else {
                config.input.active_profiles.splice(idx, 1);
                el.classList.remove('active');
            }
        }

        async function save() {
            await saveConfig();
        }

        init();
    </script>
</body>
</html>
