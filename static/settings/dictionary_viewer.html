<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>辅助码学习 - rust-ime</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container-fluid py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <a href="/" class="btn btn-outline-secondary btn-sm">← 返回控制中心</a>
            <div class="d-flex align-items-center gap-3">
                <label for="dictSelect" class="form-label mb-0 fw-bold">选择词库：</label>
                <select id="dictSelect" class="form-select form-select-sm" style="width: auto; min-width: 200px;">
                    <!-- 动态填充 -->
                </select>
            </div>
        </div>

        <div class="card shadow-sm border-0 apple-card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-0">🎓 辅助码对照表</h2>
                <div id="fileInfo" class="text-muted small">加载中...</div>
            </div>
            
            <div class="alert alert-info mb-4 border-0" style="background-color: #e3f2fd; color: #0d47a1;">
                <strong>💡 学习技巧：</strong> 
                <span class="ms-2">英文辅助码 = <code>拼音 + 英文前3位</code></span>
                <span class="ms-3">笔画辅助码 = <code>拼音 + 笔画码</code></span>
            </div>

            <div class="table-responsive">
                <table id="charsTable" class="table table-hover align-middle w-100">
                    <thead class="table-light">
                        <tr>
                            <th>拼音</th>
                            <th>汉字</th>
                            <th>英文辅助码</th>
                            <th>笔画辅助码</th>
                            <th>英文含义</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="5" class="text-center py-5">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">加载中...</span>
                                </div>
                                <div class="mt-2">正在从词库提取数据...</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <style>
        .apple-card { background: white; border-radius: 20px; }
        .aux-highlight-en { color: #d93025; font-weight: bold; background-color: #fce8e6; padding: 2px 8px; border-radius: 6px; font-family: monospace; }
        .aux-highlight-stroke { color: #0d6efd; font-weight: bold; background-color: #e7f1ff; padding: 2px 8px; border-radius: 6px; font-family: monospace; }
        .char-cell { font-size: 1.8em; font-weight: bold; color: #1d1d1f; }
        .pinyin-group-0 { background-color: #ffffff !important; }
        .pinyin-group-1 { background-color: #f5f5f7 !important; }
        .dataTables_wrapper .dataTables_filter input { border-radius: 10px; border: 1px solid #d2d2d7; padding: 4px 12px; }
    </style>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script src="/static/js/settings.js"></script>
    <script>
        $(document).ready(async function() {
            // 1. 获取所有可选字典
            const resp = await fetch('/api/dicts');
            const dicts = await resp.json();
            const select = document.getElementById('dictSelect');
            
            // 过滤出 chars 目录下的字典
            const charDicts = dicts.filter(d => d.path.includes('chars'));
            
            charDicts.forEach(d => {
                const opt = document.createElement('option');
                opt.value = d.path;
                opt.textContent = d.name.replace('.json', '');
                if (d.path.includes('chars.json')) opt.selected = true;
                select.appendChild(opt);
            });

            // 2. 初始化显示
            loadDictionaryViewer(select.value);

            // 3. 切换事件
            select.onchange = () => {
                loadDictionaryViewer(select.value);
            };
        });
    </script>
</body>
</html>
