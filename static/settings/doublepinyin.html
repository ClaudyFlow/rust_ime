<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>双拼方案设置 - rust-ime</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .kb-key {
            height: 70px;
            min-width: 60px;
        }
        .kb-key-sub {
            font-size: 11px;
            color: var(--apple-secondary);
            margin-top: 4px;
            line-height: 1.2;
        }
        .kb-key.active .kb-key-main {
            color: var(--apple-accent);
        }
        .mapping-editor {
            display: none;
            margin-top: 30px;
            padding: 24px;
            background: var(--apple-card);
            border-radius: 20px;
            border: 1px solid var(--apple-border);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/static/index.html" class="back-link">← 返回主页</a>
            <h1>双拼方案设置</h1>
        </header>

        <div class="card">
            <div class="setting-item">
                <div class="info">
                    <div class="title">启用双拼模式</div>
                    <div class="desc">结合双击行为使用：输入声母后按键触发韵母映射</div>
                </div>
                <label class="switch"><input type="checkbox" id="enable_double_pinyin"><span class="slider"></span></label>
            </div>
            <div class="setting-item">
                <div class="info"><div class="title">方案名称</div></div>
                <input type="text" id="scheme_name" style="width: 200px;">
            </div>
        </div>

        <div class="card">
            <h3>可视化映射键盘</h3>
            <p class="desc" style="margin-bottom: 20px;">点击下方按键配置对应的声母(Initial)和韵母(Rime)</p>
            <div class="keyboard" id="kb-doublepinyin"></div>
        </div>

        <div id="editor" class="mapping-editor">
            <h3 id="edit-title">编辑按键: -</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                <div class="setting-item" style="flex-direction: column; align-items: flex-start;">
                    <div class="info"><div class="title">声母映射 (Initial)</div><div class="desc">作为第一码时 (如 v -> zh)</div></div>
                    <input type="text" id="input-initial" placeholder="留空则按原键" style="width: 100%; margin-top: 8px;">
                </div>
                <div class="setting-item" style="flex-direction: column; align-items: flex-start;">
                    <div class="info"><div class="title">韵母映射 (Rime)</div><div class="desc">作为第二码时 (如 m -> ian)</div></div>
                    <input type="text" id="input-rime" placeholder="留空则按原键" style="width: 100%; margin-top: 8px;">
                </div>
            </div>
        </div>
    </div>

    <div class="sticky-footer">
        <button class="btn" onclick="save()">保存方案</button>
        <button class="btn btn-danger" onclick="resetToXiaohe()">重置为小鹤</button>
    </div>

    <div id="toast" class="status-toast">方案已保存并应用</div>

    <script src="/static/js/settings.js"></script>
    <script>
        const KB_LAYOUT = [
            ['q', 'w', 'e', 'r', 't', 'y', 'u', 'i', 'o', 'p'],
            ['a', 's', 'd', 'f', 'g', 'h', 'j', 'k', 'l'],
            ['z', 'x', 'c', 'v', 'b', 'n', 'm']
        ];
        let currentKey = '';

        async function init() {
            await loadConfig();
            document.getElementById('enable_double_pinyin').checked = config.input.enable_double_pinyin;
            document.getElementById('scheme_name').value = config.input.double_pinyin_scheme.name;
            
            document.getElementById('enable_double_pinyin').onchange = (e) => {
                config.input.enable_double_pinyin = e.target.checked;
            };
            document.getElementById('scheme_name').oninput = (e) => {
                config.input.double_pinyin_scheme.name = e.target.value;
            };

            renderKeyboard();
        }

        function renderKeyboard() {
            const container = document.getElementById('kb-doublepinyin');
            const scheme = config.input.double_pinyin_scheme;
            
            container.innerHTML = KB_LAYOUT.map(row => `
                <div class="keyboard-row">
                    ${row.map(k => {
                        const ini = scheme.initials[k] || "";
                        const rim = scheme.rimes[k] || "";
                        const isActive = ini || rim;
                        return `
                            <div class="kb-key ${isActive ? 'active' : ''} ${currentKey === k ? 'selected' : ''}" onclick="editKey('${k}')">
                                <div class="kb-key-main">${k.toUpperCase()}</div>
                                <div class="kb-key-sub">
                                    ${ini ? '初:'+ini : ''}<br>
                                    ${rim ? '末:'+rim : ''}
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `).join('');
        }

        function editKey(key) {
            currentKey = key;
            const editor = document.getElementById('editor');
            const title = document.getElementById('edit-title');
            const inIni = document.getElementById('input-initial');
            const inRim = document.getElementById('input-rime');
            
            editor.style.display = 'block';
            title.innerText = `编辑按键: ${key.toUpperCase()}`;
            
            const scheme = config.input.double_pinyin_scheme;
            inIni.value = scheme.initials[key] || "";
            inRim.value = scheme.rimes[key] || "";
            
            inIni.oninput = () => {
                if (inIni.value.trim() === "") delete scheme.initials[key];
                else scheme.initials[key] = inIni.value.trim().toLowerCase();
                renderKeyboard();
            };
            
            inRim.oninput = () => {
                if (inRim.value.trim() === "") delete scheme.rimes[key];
                else scheme.rimes[key] = inRim.value.trim().toLowerCase();
                renderKeyboard();
            };

            renderKeyboard();
            editor.scrollIntoView({ behavior: 'smooth' });
        }

        async function save() {
            await saveConfig();
        }

        function resetToXiaohe() {
            config.input.double_pinyin_scheme = {
                name: "小鹤双拼",
                initials: {"v":"zh", "u":"sh", "i":"ch"},
                rimes: {
                    "q":"iu", "w":"ei", "r":"uan", "t":"ue", "y":"un", "p":"ie", "s":"ong", 
                    "d":"ai", "f":"en", "g":"eng", "h":"ang", "j":"an", "k":"ao", "l":"iang", 
                    "z":"ou", "x":"ia", "c":"ao", "v":"ui", "b":"in", "n":"iao", "m":"ian"
                }
            };
            document.getElementById('scheme_name').value = config.input.double_pinyin_scheme.name;
            renderKeyboard();
        }

        init();
    </script>
</body>
</html>
