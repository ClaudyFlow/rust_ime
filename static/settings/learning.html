<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>练习与学习 - rust-ime</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .learning-container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* 顶部配置卡片 */
        .config-card {
            background: var(--apple-card);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid var(--apple-border);
            margin-bottom: 24px;
        }

        .switch-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }

        .switch-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(0,0,0,0.02);
            border-radius: 12px;
        }

        /* 主练习区域 */
        .practice-card {
            background: white;
            border-radius: 32px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            border: 1px solid var(--apple-border);
            position: relative;
            overflow: hidden;
        }

        .target-word-container {
            position: relative;
            display: inline-block;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .target-word-container:hover {
            transform: scale(1.05);
        }

        .target-word-container:active {
            transform: scale(0.95);
        }

        .target-word {
            font-size: 120px;
            font-weight: 700;
            color: var(--apple-text);
            margin: 0;
            line-height: 1.2;
        }

        .speaker-icon {
            position: absolute;
            top: -10px;
            right: -30px;
            font-size: 24px;
            color: var(--apple-accent);
            opacity: 0.6;
        }

        .hint-area {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 30px 0 40px 0;
            flex-wrap: wrap;
        }

        .hint-badge {
            background: #f2f2f7;
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 14px;
            color: var(--apple-secondary);
            font-weight: 500;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .hint-badge b {
            color: var(--apple-text);
            margin-left: 4px;
        }

        .practice-input {
            width: 100%;
            max-width: 500px;
            font-size: 32px;
            padding: 24px;
            border-radius: 20px;
            border: 2px solid #e1e1e6;
            text-align: center;
            outline: none;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        .practice-input:focus {
            border-color: var(--apple-accent);
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
        }

        /* 统计栏 */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: var(--apple-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--apple-text);
        }

        /* 成功动画 */
        @keyframes success-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); color: #34c759; }
            100% { transform: scale(1); }
        }
        .success-anim {
            animation: success-pop 0.4s ease-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <a href="/static/index.html" class="back-link">← 返回</a>
            <h1>练习与学习</h1>
        </header>

        <div class="learning-container">
            <div class="config-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h3 style="margin:0">练习配置</h3>
                    <select id="dictSelect" class="dictionary-select" style="width: 200px; padding: 8px; border-radius: 8px;">
                        <option value="chinese/chars/chars.json">常用汉字 (chars.json)</option>
                        <option value="chinese/words/words.json">通用词组 (words.json)</option>
                        <option value="chinese/chars/level2.json">二级汉字</option>
                        <option value="chinese/chars/level3.json">三级汉字</option>
                    </select>
                </div>

                <div class="switch-group">
                    <div class="switch-item">
                        <span class="desc">显示拼音</span>
                        <label class="switch"><input type="checkbox" id="showPinyinToggle"><span class="slider"></span></label>
                    </div>
                    <div class="switch-item">
                        <span class="desc">显示笔画码</span>
                        <label class="switch"><input type="checkbox" id="showStrokeToggle"><span class="slider"></span></label>
                    </div>
                    <div class="switch-item">
                        <span class="desc">显示英文辅助</span>
                        <label class="switch"><input type="checkbox" id="showEnglishToggle"><span class="slider"></span></label>
                    </div>
                    <div class="switch-item">
                        <span class="desc">自动发音</span>
                        <label class="switch"><input type="checkbox" id="autoPronounceToggle"><span class="slider"></span></label>
                    </div>
                </div>

                <button onclick="startPractice()" class="btn" style="margin-top: 24px; width: 100%;">开始 / 重置练习</button>
            </div>

            <div id="practiceArea" style="display: none;">
                <div class="practice-card">
                    <div class="target-word-container" onclick="pronounceCurrent()">
                        <div class="target-word" id="targetWord">...</div>
                        <div class="speaker-icon">🔊</div>
                    </div>
                    
                    <div class="hint-area">
                        <div class="hint-badge" id="pinyinHintBadge">拼音: <b id="pinyinHint">-</b></div>
                        <div class="hint-badge" id="strokeHintBadge">笔画: <b id="strokeHint">-</b></div>
                        <div class="hint-badge" id="englishHintBadge">英文: <b id="englishHint">-</b></div>
                    </div>

                    <input type="text" id="practiceInput" class="practice-input" placeholder="输入并提交词条..." autocomplete="off">

                    <div class="stats-bar">
                        <div class="stat-item">
                            <div class="stat-label">已练习</div>
                            <div class="stat-value" id="countStat">0</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">准确率</div>
                            <div class="stat-value" id="accuracyStat">0%</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">词库</div>
                            <div id="dictNameStat" style="font-weight: 600; margin-top: 8px;">-</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/settings.js"></script>
    <script>
        let currentDict = {};
        let keys = [];
        let currentIndex = -1;
        let stats = { count: 0, correct: 0 };
        let config = null;

        async function init() {
            // 获取配置
            try {
                const response = await fetch('/api/config');
                config = await response.json();
                
                // 绑定开关
                const mapping = {
                    'showPinyinToggle': 'show_pinyin_hint',
                    'showStrokeToggle': 'show_learning_stroke_hint',
                    'showEnglishToggle': 'show_learning_english_hint',
                    'autoPronounceToggle': 'auto_pronounce'
                };

                for (let [id, key] of Object.entries(mapping)) {
                    const el = document.getElementById(id);
                    el.checked = !!config.appearance[key];
                    el.onchange = async () => {
                        config.appearance[key] = el.checked;
                        updateHintVisibility();
                        await saveConfig();
                    };
                }
            } catch (e) { console.error("Config load failed", e); }
        }

        async function saveConfig() {
            await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(config)
            });
        }

        function updateHintVisibility() {
            if (!config) return;
            document.getElementById('pinyinHintBadge').style.display = config.appearance.show_pinyin_hint ? 'block' : 'none';
            document.getElementById('strokeHintBadge').style.display = config.appearance.show_learning_stroke_hint ? 'block' : 'none';
            document.getElementById('englishHintBadge').style.display = config.appearance.show_learning_english_hint ? 'block' : 'none';
        }

        async function startPractice() {
            const dictPath = document.getElementById('dictSelect').value;
            const dictName = dictPath.split('/').pop();
            document.getElementById('dictNameStat').innerText = dictName;
            
            try {
                const url = '/dicts/' + dictPath;
                const response = await fetch(url);
                if (!response.ok) throw new Error("Server error " + response.status);
                
                currentDict = await response.json();
                keys = Object.keys(currentDict);
                
                if (keys.length === 0) { alert("词典内容为空！"); return; }

                document.getElementById('practiceArea').style.display = 'block';
                stats = { count: 0, correct: 0 };
                updateStats();
                nextWord();
                updateHintVisibility();
                
                document.getElementById('practiceInput').focus();
            } catch (e) {
                alert("加载词典失败: " + e.message);
            }
        }

        function nextWord() {
            currentIndex = Math.floor(Math.random() * keys.length);
            const pinyin = keys[currentIndex];
            const data = currentDict[pinyin];
            
            let target = pinyin;
            let stroke = "无";
            let english = "无";

            if (Array.isArray(data) && data.length > 0) {
                const entry = data[Math.floor(Math.random() * data.length)];
                target = entry.char || pinyin;
                stroke = entry.stroke_aux || "无";
                english = entry.en || "无";
            } else if (Array.isArray(data)) {
                const hint = data[2] || "";
                if (hint.includes('/')) {
                    const parts = hint.split('/');
                    english = parts[0]; stroke = parts[1];
                } else if (hint.match(/^[a-zA-Z]+$/)) {
                    english = hint;
                } else {
                    stroke = hint;
                }
            } else if (typeof data === 'string') {
                target = pinyin;
                stroke = data.includes('/') ? data.split('/')[1] : data;
            }

            document.getElementById('targetWord').innerText = target;
            document.getElementById('practiceInput').value = '';
            document.getElementById('pinyinHint').innerText = pinyin;
            document.getElementById('strokeHint').innerText = stroke;
            document.getElementById('englishHint').innerText = english;
            document.getElementById('practiceInput').dataset.target = target;

            // 自动发音
            if (config && config.appearance.auto_pronounce) {
                pronounce(target);
            }
        }

        function pronounce(text) {
            if (!text) return;
            const audio = new Audio(`https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(text)}&le=zh`);
            audio.play().catch(e => console.log("Audio play blocked", e));
        }

        function pronounceCurrent() {
            const target = document.getElementById('targetWord').innerText;
            pronounce(target);
        }

        document.getElementById('practiceInput').addEventListener('input', (e) => {
            const input = e.target.value.trim();
            const target = e.target.dataset.target;
            
            if (input === target) {
                stats.count++;
                stats.correct++;
                updateStats();
                
                // 成功动画
                const card = document.querySelector('.target-word');
                card.classList.add('success-anim');
                e.target.style.borderColor = '#34c759';
                
                setTimeout(() => {
                    card.classList.remove('success-anim');
                    e.target.style.borderColor = '#e1e1e6';
                    nextWord();
                }, 400);
            }
        });

        function updateStats() {
            document.getElementById('countStat').innerText = stats.count;
            const acc = stats.count === 0 ? 0 : Math.round((stats.correct / stats.count) * 100);
            document.getElementById('accuracyStat').innerText = acc + '%';
        }

        init();
    </script>
</body>
</html>
