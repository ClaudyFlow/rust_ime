<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>学习模式设置 - rust-ime</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="/static/index.html" class="back-link">← 返回主页</a>
            <h1>学习模式设置</h1>
        </header>

        <div class="card">
            <div class="setting-item">
                <div class="info">
                    <div class="title">启用学习模式</div>
                    <div class="desc">在屏幕固定位置显示词条学习提示。</div>
                </div>
                <label class="switch"><input type="checkbox" id="learning_mode"><span class="slider"></span></label>
            </div>
        </div>

        <h2>显示配置</h2>
        <div class="card">
            <div class="setting-item">
                <div class="info"><div class="title">数据源 (词典)</div><div class="desc">从中抽取词条进行展示。</div></div>
                <select id="learning_dict_path" style="width: 300px;"></select>
            </div>
            <div class="setting-item">
                <div class="info"><div class="title">锚定位置</div></div>
                <select id="learning_anchor">
                    <option value="top_right">右上角</option>
                    <option value="top_left">左上角</option>
                    <option value="bottom_right">右下角</option>
                    <option value="bottom_left">左下角</option>
                </select>
            </div>
            <div class="grid-2">
                <div class="setting-item"><div class="info"><div class="title">字号</div></div><input type="number" id="learning_font_size"></div>
                <div class="setting-item"><div class="info"><div class="title">切换间隔 (秒)</div></div><input type="number" id="learning_interval_sec"></div>
            </div>
        </div>
    </div>

    <div class="sticky-footer">
        <button class="btn" onclick="save()">保存更改</button>
        <button class="btn btn-danger" onclick="resetConfig()">重置默认</button>
    </div>

    <div id="toast" class="status-toast">已保存并应用</div>

    <script src="/static/js/settings.js"></script>
    <script>
        async function init() {
            await loadConfig();
            
            const d_r = await fetch('/api/dicts'); 
            const dicts = await d_r.json();
            const jsonDicts = dicts.filter(d => d.path.endsWith('.json'));
            const ls = document.getElementById('learning_dict_path');
            ls.innerHTML = jsonDicts.map(d => `<option value="${d.path}">${d.name}</option>`).join('');

            bindInput('learning_mode', 'appearance');
            bindInput('learning_dict_path', 'appearance');
            bindInput('learning_anchor', 'appearance');
            bindInput('learning_font_size', 'appearance');
            bindInput('learning_interval_sec', 'appearance');
        }

        async function save() {
            await saveConfig();
        }

        init();
    </script>
</body>
</html>
