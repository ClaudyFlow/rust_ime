<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>练习与学习 - rust-ime</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .learning-container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* 配置卡片 */
        .config-card {
            background: var(--apple-card);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid var(--apple-border);
            margin-bottom: 24px;
        }

        .switch-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }

        .switch-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(0,0,0,0.02);
            border-radius: 12px;
        }

        /* 练习区域 */
        .practice-card {
            background: white;
            border-radius: 32px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            border: 1px solid var(--apple-border);
        }

        .target-word {
            font-size: 120px;
            font-weight: 700;
            color: var(--apple-text);
            margin: 0;
            line-height: 1.2;
        }

        .hint-area {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 30px 0 40px 0;
            flex-wrap: wrap;
        }

        .hint-badge {
            background: #f2f2f7;
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 14px;
            color: var(--apple-secondary);
            font-weight: 500;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .hint-badge b {
            color: var(--apple-text);
            margin-left: 4px;
        }

        .practice-input {
            width: 100%;
            max-width: 500px;
            font-size: 32px;
            padding: 24px;
            border-radius: 20px;
            border: 2px solid #e1e1e6;
            text-align: center;
            outline: none;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        .practice-input:focus {
            border-color: var(--apple-accent);
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }

        .stat-item { text-align: center; }
        .stat-label { font-size: 12px; color: var(--apple-secondary); text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-size: 28px; font-weight: 700; color: var(--apple-text); }

        @keyframes success-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); color: #34c759; }
            100% { transform: scale(1); }
        }
        .success-anim { animation: success-pop 0.4s ease-out; }
        
        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.8);
            display: flex; align-items: center; justify-content: center;
            z-index: 100; font-size: 20px; font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="loadingOverlay" class="loading-overlay" style="display:none;">正在加载词典...</div>

    <div class="container">
        <header class="header">
            <a href="/static/index.html" class="back-link">← 返回</a>
            <h1>练习与学习</h1>
        </header>

        <div class="learning-container">
            <div class="config-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h3 style="margin:0">练习配置</h3>
                    <select id="dictSelect" class="dictionary-select" style="width: 220px; padding: 8px; border-radius: 8px;">
                        <option value="chinese/chars/chars.json">常用汉字 (chars.json)</option>
                        <option value="chinese/words/words.json">通用词组 (words.json)</option>
                        <option value="chinese/chars/level2.json">二级汉字</option>
                        <option value="chinese/chars/level3.json">三级汉字</option>
                    </select>
                </div>

                <div class="switch-group">
                    <div class="switch-item">
                        <span class="desc">显示拼音</span>
                        <label class="switch"><input type="checkbox" id="showPinyinToggle"><span class="slider"></span></label>
                    </div>
                    <div class="switch-item">
                        <span class="desc">显示笔画码</span>
                        <label class="switch"><input type="checkbox" id="showStrokeToggle"><span class="slider"></span></label>
                    </div>
                    <div class="switch-item">
                        <span class="desc">显示英文辅助</span>
                        <label class="switch"><input type="checkbox" id="showEnglishToggle"><span class="slider"></span></label>
                    </div>
                </div>

                <button onclick="startPractice()" class="btn" style="margin-top: 24px; width: 100%;">开始 / 重置练习</button>
            </div>

            <div id="practiceArea" style="display: none;">
                <div class="practice-card">
                    <div class="target-word" id="targetWord">...</div>
                    
                    <div class="hint-area">
                        <div class="hint-badge" id="pinyinHintBadge">拼音: <b id="pinyinHint">-</b></div>
                        <div class="hint-badge" id="strokeHintBadge">笔画: <b id="strokeHint">-</b></div>
                        <div class="hint-badge" id="englishHintBadge">英文: <b id="englishHint">-</b></div>
                    </div>

                    <input type="text" id="practiceInput" class="practice-input" placeholder="输入并提交此词条..." autocomplete="off">

                    <div class="stats-bar">
                        <div class="stat-item">
                            <div class="stat-label">已练习</div>
                            <div class="stat-value" id="countStat">0</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">准确率</div>
                            <div class="stat-value" id="accuracyStat">0%</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">词库</div>
                            <div id="dictNameStat" style="font-weight: 600; margin-top: 8px;">-</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentDict = {};
        let keys = [];
        let stats = { count: 0, correct: 0 };
        let config = { appearance: { show_pinyin_hint: true, show_learning_stroke_hint: true, show_learning_english_hint: true } };

        async function init() {
            try {
                console.log("[Learning] 正在加载全局配置...");
                const response = await fetch('/api/config');
                if (response.ok) {
                    const loadedConfig = await response.json();
                    // 深度合并配置，防止旧版本缺字段
                    if (loadedConfig.appearance) {
                        Object.assign(config.appearance, loadedConfig.appearance);
                    }
                }
            } catch (e) { console.warn("[Learning] 配置加载失败，将使用默认值", e); }

            // 绑定开关
            const mapping = {
                'showPinyinToggle': 'show_pinyin_hint',
                'showStrokeToggle': 'show_learning_stroke_hint',
                'showEnglishToggle': 'show_learning_english_hint'
            };

            for (let [id, key] of Object.entries(mapping)) {
                const el = document.getElementById(id);
                el.checked = !!config.appearance[key];
                el.onchange = async () => {
                    config.appearance[key] = el.checked;
                    updateHintVisibility();
                    await saveConfig();
                };
            }
            updateHintVisibility();
        }

        async function saveConfig() {
            try {
                await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
            } catch (e) { console.error("保存失败", e); }
        }

        function updateHintVisibility() {
            document.getElementById('pinyinHintBadge').style.display = config.appearance.show_pinyin_hint ? 'block' : 'none';
            document.getElementById('strokeHintBadge').style.display = config.appearance.show_learning_stroke_hint ? 'block' : 'none';
            document.getElementById('englishHintBadge').style.display = config.appearance.show_learning_english_hint ? 'block' : 'none';
        }

        async function startPractice() {
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.display = 'flex';
            
            const dictPath = document.getElementById('dictSelect').value;
            document.getElementById('dictNameStat').innerText = dictPath.split('/').pop();
            
            try {
                const url = '/dicts/' + dictPath;
                console.log("[Learning] 请求词典:", url);
                const response = await fetch(url);
                if (!response.ok) throw new Error("HTTP " + response.status);
                
                currentDict = await response.json();
                keys = Object.keys(currentDict);
                
                if (keys.length === 0) throw new Error("词典内容为空");

                document.getElementById('practiceArea').style.display = 'block';
                stats = { count: 0, correct: 0 };
                updateStats();
                nextWord();
                
                document.getElementById('practiceInput').focus();
            } catch (e) {
                console.error("[Learning] 开始练习失败:", e);
                alert("无法开始练习: " + e.message + "\n请检查词典文件路径。");
            } finally {
                overlay.style.display = 'none';
            }
        }

        function nextWord() {
            if (keys.length === 0) return;
            const pinyin = keys[Math.floor(Math.random() * keys.length)];
            const data = currentDict[pinyin];
            
            let target = pinyin, stroke = "无", english = "无";

            if (Array.isArray(data) && data.length > 0) {
                const entry = data[Math.floor(Math.random() * data.length)];
                target = entry.char || pinyin;
                stroke = entry.stroke_aux || "无";
                english = entry.en || "无";
            } else if (typeof data === 'string') {
                target = pinyin;
                stroke = data.includes('/') ? data.split('/')[1] : data;
            }

            document.getElementById('targetWord').innerText = target;
            document.getElementById('practiceInput').value = '';
            document.getElementById('pinyinHint').innerText = pinyin;
            document.getElementById('strokeHint').innerText = stroke;
            document.getElementById('englishHint').innerText = english;
            document.getElementById('practiceInput').dataset.target = target;
        }

        document.getElementById('practiceInput').addEventListener('input', (e) => {
            const input = e.target.value.trim();
            const target = e.target.dataset.target;
            
            if (input === target) {
                stats.count++; stats.correct++;
                updateStats();
                
                const card = document.getElementById('targetWord');
                card.classList.add('success-anim');
                e.target.style.borderColor = '#34c759';
                
                setTimeout(() => {
                    card.classList.remove('success-anim');
                    e.target.style.borderColor = '#e1e1e6';
                    nextWord();
                }, 400);
            }
        });

        function updateStats() {
            document.getElementById('countStat').innerText = stats.count;
            const acc = stats.count === 0 ? 0 : Math.round((stats.correct / stats.count) * 100);
            document.getElementById('accuracyStat').innerText = acc + '%';
        }

        init();
    </script>
</body>
</html>
