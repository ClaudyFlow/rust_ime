<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>练习与学习 - rust-ime</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .learning-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.04);
        }

        .config-section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .target-word {
            font-size: 72px;
            text-align: center;
            margin: 40px 0;
            font-weight: 700;
            color: var(--apple-text);
        }

        .hint-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .hint-badge {
            background: #f5f5f7;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 14px;
            color: #666;
        }

        .practice-input {
            width: 100%;
            font-size: 32px;
            padding: 20px;
            border-radius: 16px;
            border: 2px solid #e1e1e6;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }

        .practice-input:focus {
            border-color: var(--apple-accent);
        }

        .stats {
            margin-top: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            text-align: center;
        }

        .stat-card {
            background: #f5f5f7;
            padding: 15px;
            border-radius: 16px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: var(--apple-accent);
        }

        .dictionary-select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-size: 16px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <a href="/static/index.html" class="back-btn">← 返回</a>
            <h1>练习与学习</h1>
        </header>

        <div class="learning-container">
            <div class="config-section">
                <h3>选择练习词典</h3>
                <select id="dictSelect" class="dictionary-select">
                    <option value="chinese/chars/chars.json">通用汉字词典 (chars.json)</option>
                    <option value="chinese/words/words.json">通用词组词典 (words.json)</option>
                    <option value="chinese/chars/level2.json">二级汉字词典</option>
                    <option value="chinese/chars/level3.json">三级汉字词典</option>
                </select>
                <button onclick="startPractice()" class="btn-primary" style="margin-top: 20px; width: 100%;">开始练习</button>
            </div>

            <div id="practiceArea" style="display: none;">
                <div class="target-word" id="targetWord">...</div>
                
                <div class="hint-area">
                    <div class="hint-badge">笔画码: <span id="strokeHint">-</span></div>
                    <div class="hint-badge">英文辅助: <span id="englishHint">-</span></div>
                </div>

                <input type="text" id="practiceInput" class="practice-input" placeholder="请在输入法中输入并提交此词条..." autocomplete="off">

                <div class="stats">
                    <div class="stat-card">
                        <div>已完成</div>
                        <div class="stat-value" id="countStat">0</div>
                    </div>
                    <div class="stat-card">
                        <div>正确数</div>
                        <div class="stat-value" id="correctStat">0</div>
                    </div>
                    <div class="stat-card">
                        <div>当前词库</div>
                        <div id="dictNameStat" style="font-size: 12px;">-</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentDict = {};
        let keys = [];
        let currentIndex = -1;
        let stats = { count: 0, correct: 0 };

        async function startPractice() {
            const dictPath = document.getElementById('dictSelect').value;
            const dictName = dictPath.split('/').pop();
            document.getElementById('dictNameStat').innerText = dictName;
            
            try {
                // 现在服务器已支持 /dicts/ 路径
                const url = '/dicts/' + dictPath;
                console.log("Fetching dictionary from:", url);
                const response = await fetch(url);
                if (!response.ok) throw new Error("Server returned " + response.status);
                
                currentDict = await response.json();
                keys = Object.keys(currentDict);
                
                if (keys.length === 0) {
                    alert("词典内容为空！");
                    return;
                }

                document.getElementById('practiceArea').style.display = 'block';
                stats = { count: 0, correct: 0 };
                updateStats();
                nextWord();
                
                document.getElementById('practiceInput').focus();
            } catch (e) {
                console.error("Load failed:", e);
                alert("加载词典失败: " + e.message + "\n请确认词典文件存在于: " + dictPath);
            }
        }

        function nextWord() {
            currentIndex = Math.floor(Math.random() * keys.length);
            const pinyin = keys[currentIndex];
            const data = currentDict[pinyin];
            
            let target = pinyin;
            let stroke = "无";
            let english = "无";

            // 处理不同的 JSON 结构
            // 1. 如果是数组形式 (例如: {"a": [{"char": "啊", "stroke_aux": "h", "en": "ah"}]})
            if (Array.isArray(data) && data.length > 0) {
                const entry = data[Math.floor(Math.random() * data.length)];
                target = entry.char || pinyin;
                stroke = entry.stroke_aux || "无";
                english = entry.en || "无";
            } 
            // 2. 如果是旧的格式 (例如: {"a": ["100", "char", "english/stroke"]})
            else if (Array.isArray(data)) {
                const hint = data[2] || "";
                if (hint.includes('/')) {
                    const parts = hint.split('/');
                    english = parts[0]; stroke = parts[1];
                } else if (hint.match(/^[a-zA-Z]+$/)) {
                    english = hint;
                } else {
                    stroke = hint;
                }
            }
            // 3. 如果是字符串 (例如: {"啊": "pinyin/stroke"})
            else if (typeof data === 'string') {
                target = pinyin;
                if (data.includes('/')) {
                    stroke = data.split('/')[1] || "无";
                } else {
                    stroke = data;
                }
            }

            document.getElementById('targetWord').innerText = target;
            document.getElementById('practiceInput').value = '';
            document.getElementById('strokeHint').innerText = stroke;
            document.getElementById('englishHint').innerText = english;
            
            // 绑定当前词条到 input 元素
            document.getElementById('practiceInput').dataset.target = target;
        }

        document.getElementById('practiceInput').addEventListener('input', (e) => {
            const input = e.target.value.trim();
            const target = e.target.dataset.target;
            
            if (input === target) {
                stats.count++;
                stats.correct++;
                updateStats();
                
                // 成功特效
                e.target.style.borderColor = '#52c41a';
                setTimeout(() => {
                    e.target.style.borderColor = '#e1e1e6';
                    nextWord();
                }, 200);
            }
        });

        function updateStats() {
            document.getElementById('countStat').innerText = stats.count;
            document.getElementById('correctStat').innerText = stats.correct;
        }
    </script>
</body>
</html>
