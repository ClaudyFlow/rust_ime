<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>词库管理 - rust-ime</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="/static/index.html" class="back-link">← 返回主页</a>
            <h1>词库管理</h1>
        </header>

        <div class="card">
            <h2>词库操作</h2>
            <div class="setting-item">
                <div class="info">
                    <div class="title">编译词库</div>
                    <div class="desc">修改词典文件或添加新词后，需要重新编译才能生效。</div>
                </div>
                <button class="btn" onclick="compile()">立即编译</button>
            </div>
        </div>

        <div id="dicts-container"></div>

        <h2 style="margin-top:60px;">词典编辑器</h2>
        <div class="card">
            <h3>添加新词条</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr auto; gap: 10px; align-items: end;">
                <div><label><small>拼音</small></label><input type="text" id="add-pinyin" placeholder="例如: nihao" style="width:100%;"></div>
                <div><label><small>词汇</small></label><input type="text" id="add-word" placeholder="例如: 你好" style="width:100%;"></div>
                <div><label><small>提示/翻译</small></label><input type="text" id="add-hint" placeholder="例如: hello" style="width:100%;"></div>
                <div><label><small>保存至词典</small></label><select id="add-target-file" style="width:100%; height: 42px;"></select></div>
                <button class="btn" onclick="addNewEntry()">添加</button>
            </div>
        </div>

        <div class="card">
            <input type="text" id="dict-search" placeholder="搜索现有词条..." style="width:100%;" oninput="doSearch()">
        </div>
        <div id="dict-results"></div>
    </div>

    <div id="toast" class="status-toast">已保存并应用</div>

    <script src="/static/js/settings.js"></script>
    <script>
        async function init() {
            await loadConfig();
            const d_r = await fetch('/api/dicts'); 
            const dicts = await d_r.json();
            renderDictsList(dicts);

            const jsonDicts = dicts.filter(d => d.path.endsWith('.json'));
            const ats = document.getElementById('add-target-file');
            if(ats) {
                ats.innerHTML = jsonDicts.map(d => `<option value="${d.path}">${d.name}</option>`).join('');
                const defaultIdx = jsonDicts.findIndex(d => d.path.includes('chinese/words'));
                if (defaultIdx !== -1) ats.selectedIndex = defaultIdx;
            }
        }

        function renderDictsList(ds) {
            const groups = {}; 
            ds.forEach(d => { if(!groups[d.group]) groups[d.group] = []; groups[d.group].push(d); });
            document.getElementById('dicts-container').innerHTML = Object.entries(groups).sort().map(([group, files]) => `
                <div class="card">
                    <h3 style="margin-top:0; color:var(--apple-accent); text-transform:capitalize;">${group}</h3>
                    ${files.map(f => `
                        <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px dashed #eee; ${f.enabled?'':'opacity:0.5'}">
                            <div>
                                <b>${f.name.replace('.disabled','')}</b><br>
                                <small>${f.entry_count.toLocaleString()} 条</small>
                            </div>
                            <label class="switch">
                                <input type="checkbox" ${f.enabled?'checked':''} onchange="toggleDict('${f.path}')">
                                <span class="slider"></span>
                            </label>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        async function toggleDict(path) { 
            await fetch('/api/dicts/toggle', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ path }) }); 
            init(); 
        }

        async function compile() { 
            showToast('编译开始，请稍候...'); 
            const res = await fetch('/api/dicts/compile', { method: 'POST' }); 
            if(res.ok) showToast('编译完成'); else showToast('编译失败');
        }

        let st = null; 
        function doSearch() { 
            const q = document.getElementById('dict-search').value; 
            if(q.length<1) {
                document.getElementById('dict-results').innerHTML = '';
                return;
            }
            if(st) clearTimeout(st); 
            st = setTimeout(async () => { 
                const res = await (await fetch(`/api/dict/search?q=${encodeURIComponent(q)}`)).json(); 
                document.getElementById('dict-results').innerHTML = res.map((item, i) => `
                    <div class="card" style="display:flex; justify-content:space-between; align-items:center; gap:15px;">
                        <div style="min-width:80px;"><b>${item.word}</b><br><small>${item.pinyin}</small></div>
                        <input type="text" id="edit-hint-${i}" value="${item.hint}" style="flex:1;">
                        <button class="btn" onclick="updateEntry(${i}, '${item.pinyin}', '${item.word}', '${item.file}')">更新</button>
                    </div>`).join(''); 
            }, 300); 
        }

        async function updateEntry(idx, pinyin, word, file) { 
            const hint = document.getElementById(`edit-hint-${idx}`).value; 
            await fetch('/api/dict/update', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ pinyin, word, new_hint: hint, file }) }); 
            showToast('更新成功');
        }

        async function addNewEntry() {
            const pinyin = document.getElementById('add-pinyin').value.trim().toLowerCase();
            const word = document.getElementById('add-word').value.trim();
            const hint = document.getElementById('add-hint').value.trim();
            const file = document.getElementById('add-target-file').value;

            if (!pinyin || !word) { alert('拼音和词汇不能为空'); return; }

            const res = await fetch('/api/dict/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pinyin, word, hint, file })
            });

            if (res.ok) {
                showToast('词条已添加，请记得重新编译。');
                document.getElementById('add-pinyin').value = '';
                document.getElementById('add-word').value = '';
                document.getElementById('add-hint').value = '';
            } else if (res.status === 409) {
                alert('该词条在目标文件中已存在。');
            } else {
                alert('添加失败，请检查后端日志。');
            }
        }

        init();
    </script>
</body>
</html>
