name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build Linux Release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: llvm-tools-preview
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-4-dev libgtk-layer-shell-dev libudev-dev
    
    - name: Build release
      run: cargo build --release --verbose
    
    - name: Package release
      run: |
        mkdir -p release
        tar -czf release/rust-ime-linux-x86_64.tar.gz -C target/release rust-ime
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: rust-ime-linux-x86_64
        path: release/rust-ime-linux-x86_64.tar.gz

  build-windows:
    name: Build Windows Release
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    
    - name: Build release
      run: cargo build --release --verbose
    
    - name: Package release
      run: |
        mkdir release
        Compress-Archive -Path target\release\rust-ime.exe -DestinationPath release\rust-ime-windows-x86_64.zip
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: rust-ime-windows-x86_64
        path: release/rust-ime-windows-x86_64.zip

  create-github-release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: rust-ime-linux-x86_64
        path: artifacts
    
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: rust-ime-windows-x86_64
        path: artifacts
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/rust-ime-linux-x86_64.tar.gz
          artifacts/rust-ime-windows-x86_64.zip
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}